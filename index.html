<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title id="pageTitle">리뷰 남기기</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --bg:#F3F6F4; --surface:#FFFFFF; --deep:#163832; --deep-light:#2C5D54;
    --text:#1B2624; --muted:#5B6B67; --gold:#C89B3C; --gold-soft:#EADFC2;
    --border:#E1E8E5; --radius:18px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
    display:flex; justify-content:center; padding:40px 20px 60px;
  }
  .wrap{ width:100%; max-width:460px; }
  .top-row{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
  .eyebrow{ font-size:12px; font-weight:700; color:var(--gold); letter-spacing:.03em; margin:0 0 6px; }
  h1{ font-size:22px; font-weight:800; color:var(--deep); margin:0 0 6px; }
  .sub{ font-size:14px; color:var(--muted); margin:0 0 26px; line-height:1.6; }
  .card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:22px; margin-bottom:16px; }
  label{ display:block; font-size:13.5px; font-weight:700; color:var(--deep); margin-bottom:8px; }
  .help{ font-size:12.5px; color:var(--muted); margin:6px 0 14px; line-height:1.6; }
  textarea{
    width:100%; border:1.5px solid var(--border); border-radius:10px; padding:13px 14px;
    font-size:14.5px; font-family:inherit; color:var(--text); margin-bottom:4px; resize:vertical;
    min-height:80px; line-height:1.55;
  }
  textarea:focus{ outline:none; border-color:var(--deep-light); }
  .btn{
    width:100%; padding:15px; border:none; border-radius:12px; font-size:15px; font-weight:700;
    cursor:pointer; background:var(--deep); color:#fff; font-family:inherit; margin-top:6px;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .btn:active{ transform:scale(.98); }
  .btn:disabled{ opacity:.6; cursor:default; }
  .btn.secondary{ background:var(--gold-soft); color:var(--deep); }
  .btn.outline{ background:#fff; color:var(--deep); border:1.5px solid var(--border); }
  .result{ display:none; }
  .result.active{ display:block; }
  .spinner{
    width:15px; height:15px; border:2px solid rgba(255,255,255,.4); border-top-color:#fff;
    border-radius:50%; animation:spin .7s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .lang-switch{
    display:flex; border:1.5px solid var(--border); border-radius:999px; overflow:hidden;
    flex-shrink:0; margin-top:2px;
  }
  .lang-switch button{
    border:none; background:transparent; font-family:inherit; font-size:11.5px; font-weight:700;
    color:var(--muted); padding:7px 9px; cursor:pointer; transition:.15s ease; white-space:nowrap;
  }
  .lang-switch button.active{ background:var(--deep); color:#fff; }
  .clinic-chip{
    display:inline-block; background:var(--gold-soft); color:var(--deep); font-size:12.5px;
    font-weight:700; padding:6px 12px; border-radius:999px; margin-bottom:14px;
  }
  .btn-row{ display:flex; gap:10px; margin-top:10px; }
  .btn-row .btn{ margin-top:0; }
  .error{ display:none; background:#FBEAEA; color:#9B3A3A; font-size:12.5px; padding:10px 12px; border-radius:10px; margin-top:10px; }
  .error.active{ display:block; }
  .toast{
    position:fixed; top:24px; left:50%; transform:translateX(-50%) translateY(-20px);
    background:var(--deep); color:#fff; font-size:13px; font-weight:600; padding:9px 16px;
    border-radius:999px; opacity:0; pointer-events:none; transition:.25s ease; z-index:99;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-row">
    <div>
      <p class="eyebrow" data-i18n="eyebrow">방문해 주셔서 감사합니다</p>
      <h1 data-i18n="title">리뷰 남기기</h1>
    </div>
    <div class="lang-switch" id="langSwitch">
      <button type="button" data-lang="ko" class="active">KO</button>
      <button type="button" data-lang="en">EN</button>
      <button type="button" data-lang="ja">JA</button>
      <button type="button" data-lang="zh">中文</button>
    </div>
  </div>

  <div class="card">
    <span class="clinic-chip" id="clinicChip"></span>
    <p class="sub" style="margin-bottom:16px;" data-i18n="sub">간단히 방문 경험을 적어주시면, AI가 리뷰 초안을 작성해 드려요. 초안은 자유롭게 수정한 뒤 남겨주세요.</p>

    <label data-i18n="notesLabel">방문 경험 (선택)</label>
    <textarea id="notes" data-i18n-placeholder="notesPlaceholder" placeholder="예: 상담이 친절했고 대기시간이 짧았어요"></textarea>
    <p class="help" data-i18n="notesHelp">키워드나 짧은 문장으로만 적어도 괜찮아요. 비워두면 일반적인 후기로 작성돼요.</p>

    <button class="btn" id="draftBtn">
      <span id="draftBtnText" data-i18n="draftBtn">AI 리뷰 초안 작성</span>
    </button>
    <div class="error" id="errorBox"></div>
  </div>

  <div class="card result" id="resultCard">
    <label data-i18n="draftLabel">리뷰 초안 (수정 가능)</label>
    <textarea id="draftText" style="min-height:120px;"></textarea>
    <p class="help" data-i18n="draftHelp">내용을 확인하고 자유롭게 고친 뒤, 아래 버튼으로 리뷰를 남겨주세요.</p>
    <div class="btn-row">
      <button class="btn secondary" id="copyBtn" data-i18n="copyBtn">복사</button>
      <button class="btn outline" id="retryBtn" data-i18n="retryBtn">다시 작성</button>
    </div>
    <div id="reviewLinks" style="margin-top:14px;"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   백엔드 연동 설정
   - /api/reviews/draft 는 이 저장소의 Vercel Serverless Function
     (api/reviews/draft.js)을 가리킵니다. 같은 Vercel 프로젝트에
     배포되므로 별도 도메인 설정 없이 상대 경로로 호출됩니다.
   - API 계약(요청/응답 형식)은 API-SPEC.md 문서를 참고하세요.
   ============================================================ */
const API_ENDPOINT = '/api/reviews/draft';

const params = new URLSearchParams(window.location.search);
const clinicName = params.get('name') || '';
const googleUrl = params.get('google') || '';
const naverUrl = params.get('naver') || '';

const i18n = {
  ko: {
    pageTitle: '리뷰 남기기', eyebrow: '방문해 주셔서 감사합니다', title: '리뷰 남기기',
    sub: '간단히 방문 경험을 적어주시면, AI가 리뷰 초안을 작성해 드려요. 초안은 자유롭게 수정한 뒤 남겨주세요.',
    notesLabel: '방문 경험 (선택)', notesPlaceholder: '예: 상담이 친절했고 대기시간이 짧았어요',
    notesHelp: '키워드나 짧은 문장으로만 적어도 괜찮아요. 비워두면 일반적인 후기로 작성돼요.',
    draftBtn: 'AI 리뷰 초안 작성', draftingBtn: '작성 중...', draftLabel: '리뷰 초안 (수정 가능)',
    draftHelp: '내용을 확인하고 자유롭게 고친 뒤, 아래 버튼으로 리뷰를 남겨주세요.',
    copyBtn: '복사', retryBtn: '다시 작성', googleBtn: '구글에 리뷰 남기기', naverBtn: '네이버에 리뷰 남기기',
    toastCopied: '복사되었어요', errorGeneric: '초안 생성에 실패했어요. 잠시 후 다시 시도해주세요.', clinicChip: name => name
  },
  en: {
    pageTitle: 'Leave a Review', eyebrow: 'Thank you for visiting', title: 'Leave a Review',
    sub: 'Briefly share your experience and AI will draft a review for you. Feel free to edit it before posting.',
    notesLabel: 'Your experience (optional)', notesPlaceholder: 'e.g. The consultation was friendly and the wait was short',
    notesHelp: 'A few keywords or a short sentence is fine. Leave it blank for a general review.',
    draftBtn: 'Generate AI Review Draft', draftingBtn: 'Generating...', draftLabel: 'Review Draft (editable)',
    draftHelp: 'Review the text, edit as needed, then post it using the buttons below.',
    copyBtn: 'Copy', retryBtn: 'Regenerate', googleBtn: 'Leave a Google Review', naverBtn: 'Leave a Naver Review',
    toastCopied: 'Copied', errorGeneric: 'Failed to generate a draft. Please try again in a moment.', clinicChip: name => name
  },
  ja: {
    pageTitle: 'レビューを書く', eyebrow: 'ご来院ありがとうございます', title: 'レビューを書く',
    sub: '来院時の感想を簡単に入力すると、AIがレビューの下書きを作成します。内容は自由に編集してから投稿してください。',
    notesLabel: '来院時の感想（任意）', notesPlaceholder: '例：カウンセリングが親切で、待ち時間も短かったです',
    notesHelp: 'キーワードや短い一文だけでも構いません。空欄の場合は一般的な内容で作成されます。',
    draftBtn: 'AIでレビュー下書き作成', draftingBtn: '作成中...', draftLabel: 'レビュー下書き（編集可）',
    draftHelp: '内容を確認し、自由に編集してから下のボタンでレビューを投稿してください。',
    copyBtn: 'コピー', retryBtn: '再作成', googleBtn: 'Googleにレビューを書く', naverBtn: 'Naverにレビューを書く',
    toastCopied: 'コピーしました', errorGeneric: '下書きの作成に失敗しました。しばらくしてから再度お試しください。', clinicChip: name => name
  },
  zh: {
    pageTitle: '撰写评论', eyebrow: '感谢您的光临', title: '撰写评论',
    sub: '简单描述一下您的就诊体验，AI 会为您生成评论草稿，您可以自由修改后再发布。',
    notesLabel: '就诊体验（可选）', notesPlaceholder: '例：咨询很亲切，等待时间也很短',
    notesHelp: '写几个关键词或一句话也可以。留空则会生成通用评论。',
    draftBtn: '生成 AI 评论草稿', draftingBtn: '生成中...', draftLabel: '评论草稿（可编辑）',
    draftHelp: '请检查内容，自由修改后，通过下方按钮发布评论。',
    copyBtn: '复制', retryBtn: '重新生成', googleBtn: '发布谷歌评论', naverBtn: '发布 Naver 评论',
    toastCopied: '已复制', errorGeneric: '草稿生成失败，请稍后重试。', clinicChip: name => name
  }
};

let currentLang = 'ko';

function applyLang(lang){
  currentLang = lang;
  const t = i18n[lang];
  document.documentElement.lang = lang;
  document.getElementById('pageTitle').textContent = t.pageTitle;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key = el.getAttribute('data-i18n');
    if(t[key] !== undefined) el.innerHTML = t[key];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>{
    const key = el.getAttribute('data-i18n-placeholder');
    if(t[key] !== undefined) el.placeholder = t[key];
  });
  document.querySelectorAll('#langSwitch button').forEach(btn=>{
    btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
  });
  document.getElementById('draftBtnText').textContent = t.draftBtn;
  renderReviewLinks();
}

document.getElementById('langSwitch').addEventListener('click', (e)=>{
  const btn = e.target.closest('button[data-lang]');
  if(!btn) return;
  applyLang(btn.getAttribute('data-lang'));
});

document.getElementById('clinicChip').textContent = clinicName;

function renderReviewLinks(){
  const t = i18n[currentLang];
  const box = document.getElementById('reviewLinks');
  box.innerHTML = '';
  if(googleUrl){
    const a = document.createElement('a');
    a.href = googleUrl; a.target = '_blank'; a.rel = 'noopener';
    a.className = 'btn'; a.style.marginTop = '0'; a.style.marginBottom = '10px';
    a.style.textDecoration = 'none'; a.textContent = t.googleBtn;
    box.appendChild(a);
  }
  if(naverUrl){
    const a = document.createElement('a');
    a.href = naverUrl; a.target = '_blank'; a.rel = 'noopener';
    a.className = 'btn secondary'; a.style.marginTop = '0';
    a.style.textDecoration = 'none'; a.textContent = t.naverBtn;
    box.appendChild(a);
  }
}

function showToast(msg){
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'), 1500);
}

const draftBtn = document.getElementById('draftBtn');
const draftBtnText = document.getElementById('draftBtnText');
const resultCard = document.getElementById('resultCard');
const draftText = document.getElementById('draftText');
const errorBox = document.getElementById('errorBox');

async function generateDraft(){
  const t = i18n[currentLang];
  errorBox.classList.remove('active');
  draftBtn.disabled = true;
  draftBtnText.innerHTML = `<span class="spinner"></span> ${t.draftingBtn}`;

  try{
    const res = await fetch(API_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        clinicName: clinicName,
        language: currentLang,
        notes: document.getElementById('notes').value.trim()
      })
    });
    if(!res.ok) throw new Error('Request failed: ' + res.status);
    const data = await res.json();
    if(!data.draft) throw new Error('No draft in response');

    draftText.value = data.draft;
    resultCard.classList.add('active');
    resultCard.scrollIntoView({ behavior:'smooth', block:'start' });
  }catch(err){
    errorBox.textContent = t.errorGeneric;
    errorBox.classList.add('active');
  }finally{
    draftBtn.disabled = false;
    draftBtnText.textContent = t.draftBtn;
  }
}

draftBtn.addEventListener('click', generateDraft);
document.getElementById('retryBtn').addEventListener('click', generateDraft);

document.getElementById('copyBtn').addEventListener('click', ()=>{
  draftText.select();
  navigator.clipboard.writeText(draftText.value).then(()=>showToast(i18n[currentLang].toastCopied));
});

applyLang('ko');
</script>
</body>
</html>
